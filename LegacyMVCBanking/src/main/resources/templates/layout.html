<!DOCTYPE html>
<html th:fragment="layout (title, content)" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3">
	<head>
		<meta http-equiv="Content-Type" content="text/html" charset="UTF-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
    	<meta name="viewport" content="width=device-width, initial-scale=1">
    		
		<title th:replace="${title}"></title>
		
		<link rel = "stylesheet" type = "text/css" href = "https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css" />

		<link rel = "stylesheet" type = "text/css" href = "app.css" />

	</head>
	<body>
		<nav class="navbar navbar-default">
  			<div class="container-fluid">
    			<div class="navbar-header">
      				<a class="navbar-brand" href="/">Internet Bank</a>
    			</div>
    			<ul class="nav navbar-nav">
      				<li class="active"><a href="/">Home</a></li>
      			</ul>
      			<form name="logout" th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
   	  				<ul class="nav navbar-nav pull-right">
     						<li><a href="#" onclick="document.forms['logout'].submit(); return false;">Sign Out</a></li>
   					</ul>
   				</form>
  			</div>
		</nav>
		<div th:replace="${content}"></div>
	</body>
</html>
