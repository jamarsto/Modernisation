<!DOCTYPE html>
<html th:replace="~{layout.html :: layout(~{::div})}" xmlns:th="http://www.thymeleaf.org">
	<body>
		<div class="container">
			<div class="row">
				<h1>Reset Password</h1>
			</div>
			<div class="row" th:if="${param.expired}">
				<div class="col-md-4"></div>
				<div class="col-md-4">
					<div class="alert alert-danger text-center" role="alert">
						Your confirmation token has expired.
					</div>
				</div>
				<div class="col-md-4"></div>
			</div>
			<form data-toggle="validator" action="#" th:action="@{/user/forgotten}" th:object="${forgottenBean}" method="post">
	        	<div class="row">
					<div class="col-md-4"></div>
					<div class="col-md-4">
						<div class="form-group">
							<label for="email">Email Address</label>
							<input data-error="Invalid Email Address" th:field="*{email}" name="email" id="email" placeholder="Enter email address" type="email" class="form-control" required/>
							<div class="help-block with-errors"></div>
						</div>
						<div class="top-buffer-bg">
							<button type="submit" class="btn btn-primary btn-block">Confirm</button>
						</div>
					</div>
					<div class="col-md-4"></div>
				</div>
			</form>
		</div>
	</body>
</html>
