<!DOCTYPE html>
<html th:replace="~{layout.html :: layout(~{::div})}" xmlns:th="http://www.thymeleaf.org">
	<body>
		<div class="container">
			<div class="row">
				<h1>Reset Password</h1>
			</div>
			<div th:if="!${param.expired}" class="row">
				<div class="col-md-4"></div>
				<div class="col-md-4">
					<div class="alert alert-info text-center" role="alert">
						You will shortly receive an email with a link to reset your password.
					</div>
				</div>
				<div class="col-md-4"></div>
			</div>
			<div th:if="${param.expired}" class="row">
				<div class="col-md-4"></div>
				<div class="col-md-4">
					<div class="alert alert-error text-center" role="alert">
						Your reset token has expired.
					</div>
				</div>
				<div class="col-md-4"></div>
			</div>
		</div>
	</body>
</html>
