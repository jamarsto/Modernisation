<!DOCTYPE html>
<html th:replace="~{layout.html :: layout(~{::div})}" xmlns:th="http://www.thymeleaf.org">
	<body>
		<div class="container">
			<div class="row">
				<h1>Internet Bank</h1>
			</div>
			<div class="row">
				<div class="col-md-4"></div>
				<div class="col-md-4">
					<div th:switch="${status}">
						<div class="alert alert-danger text-center" role="alert">
							<span th:case="400">It's not you, it's us. There was a validation failure.</span>
							<span th:case="403">You are not authorised to perform this action.</span>
							<span th:case="404">This is not the page you are looking for.</span>
							<span th:case="500">It's not you, it's us. Something went wrong at our end.</span>
							<span th:case="999" >Why are you here? There are no errors.</span>
							<span th:case="*" ><span th:text="${error}"></span> : <span th:text="${message}"></span></span>
						</div>
					</div>
				</div>
				<div class="col-md-4"></div>
			</div>
		</div>
    </body>
</html>
