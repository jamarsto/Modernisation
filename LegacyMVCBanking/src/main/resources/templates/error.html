<!DOCTYPE html>
<html th:replace="~{layout.html :: layout(~{::title}, ~{::div})}" xmlns:th="http://www.thymeleaf.org">
	<head>
		<title>Internet Bank - Error</title>
	</head>
	<body>
		<div class="container">
			<div class="row">
				<h1>Internet Bank - Error</h1>
			</div>
			<div class="row">
				<div class="col-md-4"></div>
				<div class="col-md-4">
					<div class="alert alert-danger text-center" role="alert">
						<span th:text="${error}"></span> : <span th:text="${status}"></span> : <span th:text="${message}"></span>
					</div>
				</div>
				<div class="col-md-4"></div>
			</div>
		</div>
	</body>
</html>
