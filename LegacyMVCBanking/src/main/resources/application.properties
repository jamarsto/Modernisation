spring.datasource.url = ${SPRING_DATASOURCE_URL}
spring.datasource.username = ${SPRING_DATASOURCE_USERNAME}
spring.datasource.password = ${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name = ${SPRING_DATASOURCE_DRIVER_CLASS_NAME}

spring.jpa.open-in-view = false
spring.profiles.active = default
spring.aop.proxy-target-class = true
spring.main.banner-mode = off

spring.mail.host = ${SPRING_MAIL_HOST}
spring.mail.port = ${SPRING_MAIL_PORT}
spring.mail.username = ${SPRING_MAIL_USERNAME}
spring.mail.password = ${SPRING_MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth = ${SPRING_MAIL_AUTH}
spring.mail.properties.mail.smtp.starttls.enable = ${SPRING_STARTTLS}
spring.mail.properties.mail.smtp.socketFactory.class = ${SPRING_SOCKET_FACTORY}

logging.level.org.springframework: ${SPRING_LOGGING_LEVEL}
logging.level.org.hibernate: ${SPRING_LOGGING_LEVEL}
logging.level.com.zaxxer: ${SPRING_LOGGING_LEVEL}
logging.level.uk.me.jasonmarston: ${SPRING_LOGGING_LEVEL}